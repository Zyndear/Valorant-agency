<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ValoAgence">
<meta name="theme-color" content="#0f0f0f">
<title>ValoAgence IA</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --muted: #888;
    --accent: #ff4655;
    --accent2: #00d4aa;
    --warn: #f0a500;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 0 0 80px; }

  header { padding: 20px 20px 0; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .badge { font-size: 11px; background: rgba(255,70,85,0.15); color: var(--accent); border: 1px solid rgba(255,70,85,0.3); padding: 3px 8px; border-radius: 20px; font-weight: 500; }

  .config-section { margin: 16px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .config-toggle { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; cursor: pointer; }
  .config-toggle span { font-size: 13px; font-weight: 500; color: var(--muted); }
  .config-toggle i { font-size: 16px; color: var(--muted); transition: transform 0.2s; }
  .config-toggle.open i { transform: rotate(180deg); }
  .config-body { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); }
  .config-body.open { display: block; }
  .config-body label { display: block; font-size: 11px; color: var(--muted); margin: 12px 0 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .config-body input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); font-size: 13px; font-family: 'DM Sans', sans-serif; }
  .config-body input:focus { outline: 1px solid var(--accent); }
  .save-btn { margin-top: 12px; width: 100%; padding: 10px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Syne', sans-serif; }

  .input-section { margin: 0 20px 16px; }
  .input-section textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; color: var(--text); font-size: 15px; font-family: 'DM Sans', sans-serif; resize: none; height: 70px; line-height: 1.5; }
  .input-section textarea:focus { outline: 1px solid var(--accent); }
  .input-section textarea::placeholder { color: var(--muted); }

  .run-all { margin: 0 20px 20px; width: calc(100% - 40px); padding: 14px; background: var(--accent); color: white; border: none; border-radius: 12px; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: 0.3px; transition: opacity 0.2s; }
  .run-all:hover { opacity: 0.9; }
  .run-all:disabled { opacity: 0.4; cursor: not-allowed; }

  .agents { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 20px; }
  @media (min-width: 600px) { .agents { grid-template-columns: repeat(3, 1fr); } }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; display: flex; flex-direction: column; gap: 10px; transition: border-color 0.2s; }
  .card.running { border-color: var(--warn); }
  .card.done { border-color: var(--accent2); }
  .card.error { border-color: var(--accent); }

  .card-head { display: flex; align-items: center; gap: 8px; }
  .card-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .card-name { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; }
  .card-model { font-size: 10px; color: var(--muted); margin-top: 1px; }

  .card-status { font-size: 10px; height: 14px; }
  .card-status.running { color: var(--warn); }
  .card-status.done { color: var(--accent2); }
  .card-status.error { color: var(--accent); }

  .card-output { font-size: 12px; line-height: 1.6; color: #ccc; background: var(--surface2); border-radius: 8px; padding: 10px; display: none; max-height: 200px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; }
  .card-output.visible { display: block; }

  .card-img { border-radius: 8px; width: 100%; display: none; }
  .card-img.visible { display: block; }

  .card-foot { display: flex; gap: 6px; }
  .btn-run { flex: 1; padding: 8px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .btn-run:hover { border-color: var(--accent); color: var(--accent); }
  .btn-run:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-copy { padding: 8px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-size: 12px; cursor: pointer; display: none; }
  .btn-copy.visible { display: block; }

  .install-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 12px 20px; font-size: 12px; color: var(--muted); text-align: center; display: none; }
  .install-bar.show { display: block; }

  .section-label { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; padding: 0 20px; margin-bottom: 10px; }
</style>
</head>
<body>

<header>
  <div class="logo">Valo<span>Agence</span></div>
  <div class="badge">6 agents IA</div>
</header>

<div style="height:16px"></div>

<div class="config-section">
  <div class="config-toggle" onclick="toggleConfig(this)">
    <span>⚙ Clés API</span>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
  </div>
  <div class="config-body">
    <label>Clé Groq (groq.com — gratuit)</label>
    <input type="password" id="groq-key" placeholder="gsk_..." />
    <label>Clé Gemini (aistudio.google.com — gratuit)</label>
    <input type="password" id="gemini-key" placeholder="AIza..." />
    <button class="save-btn" onclick="saveKeys()">Enregistrer les clés</button>
  </div>
</div>

<div class="input-section">
  <textarea id="sujet" placeholder="Sujet de ta vidéo (ex: les erreurs de visée en ranked)"></textarea>
</div>

<button class="run-all" onclick="runAll()" id="run-all-btn">Lancer tous les agents</button>

<div class="section-label">Agents</div>
<div class="agents" id="agents-grid"></div>

<div class="install-bar" id="install-bar">
  Sur iPhone : Safari → Partager → "Sur l'écran d'accueil" pour installer l'app
</div>

<script>
const AGENTS = [
  {
    id: "recherche",
    name: "Chercheur",
    model: "Groq · Llama 3",
    icon: "🔍",
    iconBg: "#1e3a5f",
    api: "groq",
    prompt: s => `Tu es expert Valorant. Pour le sujet "${s}", liste les 5 erreurs débutants les plus fréquentes en ranked avec une explication courte pour chacune. Sois précis et concret. En français.`
  },
  {
    id: "script",
    name: "Scénariste",
    model: "Gemini Flash",
    icon: "📝",
    iconBg: "#1a3d2e",
    api: "gemini",
    prompt: s => `Tu es scénariste YouTube gaming. Rédige un script vidéo de 3-4 minutes sur "${s}" pour débutants Valorant. Structure: accroche 15s, points clés, conclusion avec CTA. Ton dynamique et pédagogique. En français.`
  },
  {
    id: "seo",
    name: "Titre & SEO",
    model: "Groq · Mixtral",
    icon: "📈",
    iconBg: "#3d2a0a",
    api: "groq",
    model_id: "mixtral-8x7b-32768",
    prompt: s => `Expert SEO YouTube gaming francophone. Pour "${s}" série Valorant débutants: génère 3 titres accrocheurs (max 60 chars), 1 description optimisée (150 mots), 10 tags. En français.`
  },
  {
    id: "miniature",
    name: "Miniature",
    model: "Pollinations.ai",
    icon: "🎨",
    iconBg: "#3d1a2e",
    api: "pollinations",
    prompt: s => `Valorant gaming YouTube thumbnail, ${s}, beginner mistakes, dramatic lighting, red and white colors, bold text overlay, high energy esports style, 4k`
  },
  {
    id: "planning",
    name: "Planning",
    model: "Gemini Flash",
    icon: "📅",
    iconBg: "#1a3320",
    api: "gemini",
    prompt: s => `Stratège contenu YouTube gaming. Vidéo actuelle: "${s}" série Valorant débutants. Propose 5 idées de vidéos suivantes logiques, dans un ordre cohérent. Pour chacune: titre + angle éditorial. En français.`
  },
  {
    id: "partenariat",
    name: "Partenariat",
    model: "Groq · Llama 3",
    icon: "🤝",
    iconBg: "#2a1a3d",
    api: "groq",
    prompt: s => `Manager influenceur gaming. Rédige un message de prospection (200 mots max) pour contacter une marque de périphériques gaming (Razer, SteelSeries, HyperX) pour un partenariat. Chaîne Valorant débutants, vidéo sur "${s}". Accroche, présentation courte, proposition de valeur, CTA. En français.`
  }
];

function loadKeys() {
  document.getElementById("groq-key").value = localStorage.getItem("groq_key") || "";
  document.getElementById("gemini-key").value = localStorage.getItem("gemini_key") || "";
}

function saveKeys() {
  localStorage.setItem("groq_key", document.getElementById("groq-key").value.trim());
  localStorage.setItem("gemini_key", document.getElementById("gemini-key").value.trim());
  const btn = document.querySelector(".save-btn");
  btn.textContent = "✓ Enregistré";
  setTimeout(() => btn.textContent = "Enregistrer les clés", 2000);
}

function toggleConfig(el) {
  el.classList.toggle("open");
  el.nextElementSibling.classList.toggle("open");
}

function buildGrid() {
  const grid = document.getElementById("agents-grid");
  grid.innerHTML = AGENTS.map(a => `
    <div class="card" id="card-${a.id}">
      <div class="card-head">
        <div class="card-icon" style="background:${a.iconBg}">${a.icon}</div>
        <div>
          <div class="card-name">${a.name}</div>
          <div class="card-model">${a.model}</div>
        </div>
      </div>
      <div class="card-status" id="status-${a.id}"></div>
      <img class="card-img" id="img-${a.id}" />
      <div class="card-output" id="out-${a.id}"></div>
      <div class="card-foot">
        <button class="btn-run" id="btn-${a.id}" onclick="runAgent('${a.id}')">Lancer</button>
        <button class="btn-copy" id="copy-${a.id}" onclick="copyOut('${a.id}')">📋</button>
      </div>
    </div>
  `).join("");
}

async function callGroq(prompt, model) {
  const key = localStorage.getItem("groq_key");
  if (!key) throw new Error("Clé Groq manquante");
  const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + key },
    body: JSON.stringify({ model: model || "llama3-8b-8192", messages: [{ role: "user", content: prompt }], max_tokens: 800 })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.choices[0].message.content;
}

async function callGemini(prompt) {
  const key = localStorage.getItem("gemini_key");
  if (!key) throw new Error("Clé Gemini manquante");
  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.candidates[0].content.parts[0].text;
}

function getPollinationsUrl(prompt) {
  return "https://image.pollinations.ai/prompt/" + encodeURIComponent(prompt) + "?width=640&height=360&nologo=true";
}

async function runAgent(id) {
  const sujet = document.getElementById("sujet").value.trim();
  if (!sujet) { alert("Entre un sujet d'abord."); return; }

  const agent = AGENTS.find(a => a.id === id);
  const card = document.getElementById("card-" + id);
  const out = document.getElementById("out-" + id);
  const img = document.getElementById("img-" + id);
  const status = document.getElementById("status-" + id);
  const btn = document.getElementById("btn-" + id);
  const copy = document.getElementById("copy-" + id);

  card.className = "card running";
  status.textContent = "En cours...";
  status.className = "card-status running";
  out.classList.remove("visible");
  img.classList.remove("visible");
  copy.classList.remove("visible");
  btn.disabled = true;

  try {
    if (agent.api === "pollinations") {
      const url = getPollinationsUrl(agent.prompt(sujet));
      img.src = url;
      img.classList.add("visible");
      img.onload = () => {
        card.className = "card done";
        status.textContent = "✓ Image générée";
        status.className = "card-status done";
      };
    } else {
      let result;
      if (agent.api === "groq") result = await callGroq(agent.prompt(sujet), agent.model_id);
      else result = await callGemini(agent.prompt(sujet));
      out.textContent = result;
      out.classList.add("visible");
      copy.classList.add("visible");
      card.className = "card done";
      status.textContent = "✓ Terminé";
      status.className = "card-status done";
    }
  } catch(e) {
    out.textContent = "Erreur : " + e.message;
    out.classList.add("visible");
    card.className = "card error";
    status.textContent = "✗ " + e.message;
    status.className = "card-status error";
  }
  btn.disabled = false;
}

async function runAll() {
  const sujet = document.getElementById("sujet").value.trim();
  if (!sujet) { alert("Entre un sujet d'abord."); return; }
  const btn = document.getElementById("run-all-btn");
  btn.disabled = true;
  btn.textContent = "Agents en cours...";
  for (const a of AGENTS) {
    runAgent(a.id);
    await new Promise(r => setTimeout(r, 200));
  }
  setTimeout(() => {
    btn.disabled = false;
    btn.textContent = "Lancer tous les agents";
  }, 5000);
}

function copyOut(id) {
  const text = document.getElementById("out-" + id).textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById("copy-" + id);
    btn.textContent = "✓";
    setTimeout(() => btn.textContent = "📋", 2000);
  });
}

buildGrid();
loadKeys();

// Show install hint on mobile
if (/iPhone|iPad/.test(navigator.userAgent) && !navigator.standalone) {
  document.getElementById("install-bar").classList.add("show");
}
</script>
</body>
</html>
