<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ValoAgence">
<meta name="theme-color" content="#0f0f0f">
<title>ValoAgence IA</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:rgba(255,255,255,0.08);--text:#f0f0f0;--muted:#888;--accent:#ff4655;--green:#00d4aa;--warn:#f0a500; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding-bottom:100px;}
  header{padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between;}
  .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;}
  .logo span{color:var(--accent);}
  .badge{font-size:11px;background:rgba(255,70,85,0.15);color:var(--accent);border:1px solid rgba(255,70,85,0.3);padding:3px 8px;border-radius:20px;}
  .key-section{margin:16px 20px;background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
  .key-toggle{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;}
  .key-toggle span{font-size:13px;color:var(--muted);}
  .key-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border);}
  .key-body.open{display:block;}
  .key-body label{display:block;font-size:11px;color:var(--muted);margin:12px 0 4px;text-transform:uppercase;letter-spacing:.5px;}
  .key-body input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;}
  .key-body input:focus{outline:1px solid var(--accent);}
  .key-hint{font-size:11px;color:var(--muted);margin-top:4px;}
  .key-hint a{color:var(--accent);}
  .save-btn{margin-top:10px;width:100%;padding:10px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Syne',sans-serif;}
  .test-btn{margin-top:6px;width:100%;padding:10px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .input-wrap{margin:0 20px 12px;}
  .input-wrap textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;resize:none;height:70px;line-height:1.5;}
  .input-wrap textarea:focus{outline:1px solid var(--accent);}
  .input-wrap textarea::placeholder{color:var(--muted);}
  .run-all{margin:0 20px 20px;display:block;width:calc(100% - 40px);padding:14px;background:var(--accent);color:white;border:none;border-radius:12px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s;}
  .run-all:disabled{opacity:.4;cursor:not-allowed;}
  .section-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:0 20px;margin-bottom:10px;font-family:'Syne',sans-serif;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 20px;}
  @media(min-width:600px){.grid{grid-template-columns:repeat(3,1fr);}}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:8px;transition:border-color .2s;}
  .card.running{border-color:var(--warn);}
  .card.done{border-color:var(--green);}
  .card.error{border-color:var(--accent);}
  .card-head{display:flex;align-items:center;gap:8px;}
  .card-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .card-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;}
  .card-model{font-size:10px;color:var(--muted);}
  .card-status{font-size:10px;min-height:14px;}
  .card-status.running{color:var(--warn);}
  .card-status.done{color:var(--green);}
  .card-status.error{color:var(--accent);}
  .card-output{font-size:12px;line-height:1.6;color:#ccc;background:var(--surface2);border-radius:8px;padding:10px;display:none;max-height:200px;overflow-y:auto;white-space:pre-wrap;word-break:break-word;}
  .card-output.visible{display:block;}
  .card-img{border-radius:8px;width:100%;display:none;}
  .card-img.visible{display:block;}
  .style-tabs{display:flex;gap:5px;flex-wrap:wrap;}
  .style-tab{font-size:11px;padding:4px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;}
  .style-tab.active{border-color:var(--accent);color:var(--accent);}
  .img-nav{display:flex;align-items:center;justify-content:space-between;gap:6px;}
  .img-nav button{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:5px 10px;cursor:pointer;}
  .card-foot{display:flex;gap:6px;}
  .btn-run{flex:1;padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .btn-run:hover{border-color:var(--accent);color:var(--accent);}
  .btn-run:disabled{opacity:.4;cursor:not-allowed;}
  .btn-copy{padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;cursor:pointer;display:none;}
  .btn-copy.visible{display:block;}
  .install-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 20px;font-size:12px;color:var(--muted);text-align:center;display:none;}
  .install-bar.show{display:block;}
</style>
</head>
<body>

<header>
  <div class="logo">Valo<span>Agence</span></div>
  <div class="badge">7 agents IA</div>
</header>

<div style="height:16px"></div>

<div class="key-section">
  <div class="key-toggle" onclick="this.nextElementSibling.classList.toggle('open')">
    <span>⚙ Clé API Groq</span><span>▾</span>
  </div>
  <div class="key-body">
    <label>Clé Groq — une seule clé pour tous les agents</label>
    <input type="password" id="groq-key" placeholder="gsk_..." />
    <div class="key-hint">Gratuit sur <a href="https://console.groq.com" target="_blank">console.groq.com</a></div>
    <button class="save-btn" onclick="saveKey()">Enregistrer</button>
    <button class="test-btn" id="test-btn" onclick="testKey()">Tester la clé</button>
  </div>
</div>

<div class="input-wrap">
  <textarea id="sujet" placeholder="Sujet de ta vidéo (ex: les erreurs de visée en ranked)"></textarea>
</div>

<button class="run-all" id="run-all-btn" onclick="runAll()">⚡ Lancer tous les agents</button>

<div class="section-label">Agents</div>
<div class="grid" id="grid"></div>

<div class="install-bar" id="install-bar">
  📱 Safari → Partager → "Sur l'écran d'accueil" pour installer
</div>

<script>
const AGENTS = [
  {
    id: "recherche", name: "Chercheur", model: "Llama 3.3 · 70B", icon: "🔍", bg: "#1e3a5f",
    groq_model: "llama-3.3-70b-versatile",
    prompt: s => `Tu es un analyste data spécialisé croissance YouTube gaming francophone. Objectif : 100 000 vues par vidéo.

Sujet : "${s}" — série Valorant débutants ranked.

1. POTENTIEL VIRAL : pourquoi ce sujet peut exploser
2. ANGLE DIFFÉRENCIANT : ce que les autres créateurs ratent
3. TOP 5 ERREURS DÉBUTANTS : les plus universelles et frustrantes
4. HOOK PSYCHOLOGIQUE : quelle émotion exploiter pour maximiser le CTR
5. MOTS-CLÉS : termes les plus recherchés par les débutants

Sois direct, concret, orienté performance. En français.`
  },
  {
    id: "script", name: "Scénariste", model: "Llama 3.3 · 70B", icon: "📝", bg: "#1a3d2e",
    groq_model: "llama-3.3-70b-versatile",
    prompt: s => `Tu es scénariste YouTube expert en rétention et viralité gaming francophone. Objectif : 100 000 vues minimum.

Sujet : "${s}" — série Valorant débutants ranked.

Propose 3 AXES NARRATIFS :

AXE 1 — L erreur que TOUT LE MONDE fait
Accroche (0-15s) + structure + twist + CTA + potentiel rétention

AXE 2 — La transformation before/after
Accroche (0-15s) + structure + twist + CTA + potentiel rétention

AXE 3 — L angle contre-intuitif
Accroche (0-15s) + structure + twist + CTA + potentiel rétention

Pour chaque axe : durée idéale et pourquoi ca peut exploser. En français.`
  },
  {
    id: "seo", name: "Titre & SEO", model: "Llama 3.3 · 70B", icon: "📈", bg: "#3d2a0a",
    groq_model: "llama-3.3-70b-versatile",
    prompt: s => `Tu es expert SEO YouTube gaming francophone. Objectif : maximiser CTR et atteindre 100 000 vues.

Sujet : "${s}" — série Valorant débutants ranked.

TITRES (3 options classées par potentiel CTR)
- Titre A avec score CTR estimé /10
- Titre B avec score CTR estimé /10
- Titre C avec score CTR estimé /10

DESCRIPTION (150 mots optimisée)

TAGS (15 tags du plus au moins compétitif)

STRATÉGIE BOOST : meilleur moment de publication + communautés + idée Short

En français.`
  },
  {
    id: "miniature", name: "Miniature", model: "Pollinations.ai", icon: "🎨", bg: "#3d1a2e",
    groq_model: null, styleIdx: 0,
    styles: [
      { label: "🔥 Choc",  prompt: s => `YouTube high CTR thumbnail Valorant beginner ${s}, extreme shocked face, giant red X warning, neon red black lighting, bold white impact font, viral style` },
      { label: "💡 Tuto",  prompt: s => `YouTube tutorial thumbnail Valorant ${s}, clean split before after, blue orange contrast, upward arrow, bright flat design, bold sans-serif text` },
      { label: "😤 Rage",  prompt: s => `YouTube viral thumbnail Valorant rank fail ${s}, exaggerated rage face, fire explosion, broken keyboard, comic style, orange red contrast, bold fat text` },
      { label: "🎯 Pro",   prompt: s => `YouTube premium thumbnail Valorant ${s}, cinematic dark scene, agent silhouette glowing crosshair, gold rank emblem, sleek minimal typography, 4K esports` }
    ]
  },
  {
    id: "coaching", name: "Coach Valo", model: "Llama 3.3 · 70B", icon: "🧠", bg: "#2a1a1a",
    groq_model: "llama-3.3-70b-versatile",
    prompt: s => `Tu es coach Valorant professionnel et psychologue du sport spécialisé esport. Tu as coaché des joueurs de Bronze à Diamond.

Sujet : "${s}" — série Valorant débutants ranked.

VOLET 1 — CORRECTION TECHNIQUE
Pour chaque erreur liée au sujet :
- L erreur exacte et pourquoi elle se produit
- Exercice concret pour la corriger (durée + fréquence)
- Comment mesurer sa progression

VOLET 2 — DÉVELOPPEMENT MENTAL
- Le pattern mental toxique lié à ce sujet
- Technique de reset mental immédiat utilisable en partie
- Routine pré-game pour aborder ce sujet avec le bon état d esprit
- Mindset de pro à adopter

BONUS CRÉATEUR
- Comment présenter ce coaching pour que les spectateurs ressentent une vraie transformation

En français, bienveillant mais exigeant.`
  },
  {
    id: "planning", name: "Planning", model: "Llama 3.1 · 8B", icon: "📅", bg: "#1a3320",
    groq_model: "llama-3.1-8b-instant",
    prompt: s => `Tu es stratège de contenu YouTube gaming francophone. Objectif : 100 000 vues par vidéo.

Vidéo actuelle : "${s}" — série Valorant débutants ranked.

CALENDRIER 6 SEMAINES
Pour chaque semaine : sujet + titre + angle narratif + lien avec vidéo précédente + format recommandé

STRATÉGIE DE SÉRIE
- Comment créer une dépendance narrative entre les vidéos
- Idées de Shorts à publier entre les vidéos longues

OBJECTIFS DE PROGRESSION
- Vues attendues par vidéo
- Indicateurs à surveiller (CTR, rétention, abonnés/vidéo)

En français, concret et actionnable.`
  },
  {
    id: "partenariat", name: "Partenariat", model: "Llama 3.1 · 8B", icon: "🤝", bg: "#2a1a3d",
    groq_model: "llama-3.1-8b-instant",
    prompt: s => `Tu es manager d influenceurs gaming expert en négociation de partenariats pour créateurs YouTube.

Contexte : chaîne Valorant débutants ranked, vidéo sur "${s}", objectif 100 000 vues/vidéo.

EMAIL DE PROSPECTION (200 mots max)
- Objet irrésistible + corps : accroche, pitch chiffré, proposition de valeur, CTA

MARQUES À CIBLER
- 5 marques gaming pertinentes avec type de deal à proposer

ARGUMENTAIRE DE VENTE
- Profil de l audience + comment présenter ses stats même avec peu d abonnés

TARIFICATION INDICATIVE
- Grille de prix selon vues par vidéo
- Ce qu il ne faut jamais accepter

En français, direct et professionnel.`
  }
];

function saveKey() {
  const val = document.getElementById("groq-key").value.replace(/\s+/g, "").trim();
  if (!val) return;
  localStorage.setItem("groq_key", val);
  const btn = document.querySelector(".save-btn");
  btn.textContent = "✓ Enregistré (" + val.length + " chars)";
  setTimeout(() => btn.textContent = "Enregistrer", 3000);
}

function loadKey() {
  document.getElementById("groq-key").value = localStorage.getItem("groq_key") || "";
}

async function testKey() {
  const key = localStorage.getItem("groq_key");
  const btn = document.getElementById("test-btn");
  if (!key) { btn.textContent = "❌ Aucune clé enregistrée"; return; }
  btn.textContent = "Test en cours...";
  try {
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + key.replace(/\s+/g,"").trim() },
      body: JSON.stringify({ model: "llama-3.1-8b-instant", messages: [{ role: "user", content: "OK" }], max_tokens: 5 })
    });
    const d = await res.json();
    btn.textContent = res.ok ? "✅ Clé valide !" : "❌ " + (d.error?.message || "Clé invalide");
  } catch(e) {
    btn.textContent = "❌ " + e.message;
  }
  setTimeout(() => btn.textContent = "Tester la clé", 4000);
}

async function callGroq(prompt, model) {
  const key = localStorage.getItem("groq_key");
  if (!key) throw new Error("Clé Groq manquante — configure-la en haut");
  const cleanKey = key.replace(/\s+/g, "").trim();
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 30000);
  try {
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      signal: controller.signal,
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + cleanKey },
      body: JSON.stringify({ model: model, messages: [{ role: "user", content: prompt }], max_tokens: 900, temperature: 0.7 })
    });
    clearTimeout(timeout);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || "Erreur API " + res.status);
    return data.choices[0].message.content;
  } catch(e) {
    clearTimeout(timeout);
    if (e.name === "AbortError") throw new Error("Timeout — réessaie");
    throw e;
  }
}

async function generateMiniature(agent, sujet, idx) {
  const img = document.getElementById("img-miniature");
  const nav = document.getElementById("nav-miniature");
  const navLabel = document.getElementById("nav-label-miniature");
  const style = agent.styles[idx];
  img.src = "https://image.pollinations.ai/prompt/" + encodeURIComponent(style.prompt(sujet)) + "?width=640&height=360&nologo=true&seed=" + Date.now();
  img.classList.add("visible");
  if (nav) nav.style.display = "flex";
  if (navLabel) navLabel.textContent = style.label;
  await new Promise((res, rej) => {
    img.onload = () => res();
    img.onerror = () => rej(new Error("Échec image"));
    setTimeout(() => rej(new Error("Timeout image")), 30000);
  });
}

function buildStyleTabs(agent) {
  const container = document.getElementById("styles-miniature");
  if (!container) return;
  container.innerHTML = agent.styles.map((s, i) =>
    `<button class="style-tab ${i === (agent.styleIdx||0) ? 'active' : ''}" onclick="selectStyle(${i})">${s.label}</button>`
  ).join("");
}

async function selectStyle(idx) {
  const agent = AGENTS.find(a => a.id === "miniature");
  agent.styleIdx = idx;
  buildStyleTabs(agent);
  const sujet = document.getElementById("sujet").value.trim();
  if (!sujet) return;
  const card = document.getElementById("card-miniature");
  const status = document.getElementById("status-miniature");
  card.className = "card running";
  status.textContent = "En cours...";
  status.className = "card-status running";
  try {
    await generateMiniature(agent, sujet, idx);
    card.className = "card done";
    status.textContent = "✓ Image générée";
    status.className = "card-status done";
  } catch(e) {
    card.className = "card error";
    status.textContent = "❌ " + e.message;
    status.className = "card-status error";
  }
}

function prevStyle() {
  const agent = AGENTS.find(a => a.id === "miniature");
  selectStyle(((agent.styleIdx||0) - 1 + agent.styles.length) % agent.styles.length);
}
function nextStyle() {
  const agent = AGENTS.find(a => a.id === "miniature");
  selectStyle(((agent.styleIdx||0) + 1) % agent.styles.length);
}

function buildGrid() {
  document.getElementById("grid").innerHTML = AGENTS.map(a => `
    <div class="card" id="card-${a.id}">
      <div class="card-head">
        <div class="card-icon" style="background:${a.bg}">${a.icon}</div>
        <div>
          <div class="card-name">${a.name}</div>
          <div class="card-model">${a.model}</div>
        </div>
      </div>
      <div class="card-status" id="status-${a.id}"></div>
      ${a.id === 'miniature' ? `
        <div class="style-tabs" id="styles-miniature"></div>
        <img class="card-img" id="img-miniature" alt="miniature" />
        <div class="img-nav" id="nav-miniature" style="display:none">
          <button onclick="prevStyle()">◀</button>
          <span id="nav-label-miniature" style="font-size:11px;color:var(--muted)"></span>
          <button onclick="nextStyle()">▶</button>
        </div>
      ` : `<div class="card-output" id="out-${a.id}"></div>`}
      <div class="card-foot">
        <button class="btn-run" id="btn-${a.id}" onclick="runAgent('${a.id}')">Lancer</button>
        ${a.id !== 'miniature' ? `<button class="btn-copy" id="copy-${a.id}" onclick="copyOut('${a.id}')">📋</button>` : ''}
      </div>
    </div>
  `).join("");
}

async function runAgent(id) {
  const sujet = document.getElementById("sujet").value.trim();
  if (!sujet) { alert("Entre un sujet d'abord."); return; }
  const agent = AGENTS.find(a => a.id === id);
  const card   = document.getElementById("card-" + id);
  const out    = document.getElementById("out-" + id);
  const status = document.getElementById("status-" + id);
  const btn    = document.getElementById("btn-" + id);
  const copy   = document.getElementById("copy-" + id);

  card.className = "card running";
  status.textContent = "En cours...";
  status.className = "card-status running";
  if (out) { out.textContent = ""; out.classList.remove("visible"); }
  if (copy) copy.classList.remove("visible");
  btn.disabled = true;

  try {
    if (agent.groq_model === null) {
      await generateMiniature(agent, sujet, agent.styleIdx || 0);
      card.className = "card done";
      status.textContent = "✓ Image générée";
      status.className = "card-status done";
    } else {
      const result = await callGroq(agent.prompt(sujet), agent.groq_model);
      if (out) { out.textContent = result; out.classList.add("visible"); }
      if (copy) copy.classList.add("visible");
      card.className = "card done";
      status.textContent = "✓ Terminé";
      status.className = "card-status done";
    }
  } catch(e) {
    if (out) { out.textContent = "❌ " + e.message; out.classList.add("visible"); }
    status.textContent = "❌ " + e.message;
    status.className = "card-status error";
    card.className = "card error";
  }
  btn.disabled = false;
}

async function runAll() {
  const sujet = document.getElementById("sujet").value.trim();
  if (!sujet) { alert("Entre un sujet d'abord."); return; }
  const btn = document.getElementById("run-all-btn");
  btn.disabled = true;
  btn.textContent = "Agents en cours...";
  for (const a of AGENTS) { runAgent(a.id); await new Promise(r => setTimeout(r, 300)); }
  setTimeout(() => { btn.disabled = false; btn.textContent = "⚡ Lancer tous les agents"; }, 6000);
}

function copyOut(id) {
  const text = document.getElementById("out-" + id)?.textContent;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById("copy-" + id);
    btn.textContent = "✓";
    setTimeout(() => btn.textContent = "📋", 2000);
  });
}

buildGrid();
loadKey();
buildStyleTabs(AGENTS.find(a => a.id === "miniature"));
if (/iPhone|iPad/.test(navigator.userAgent) && !navigator.standalone) {
  document.getElementById("install-bar").classList.add("show");
}
</script>
</body>
</html>
