<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ValoAgence">
<meta name="theme-color" content="#0f0f0f">
<title>ValoAgence IA</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --muted: #888;
    --accent: #ff4655;
    --green: #00d4aa;
    --warn: #f0a500;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding-bottom: 80px; }

  header { padding: 20px 20px 0; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; }
  .logo span { color: var(--accent); }
  .badge { font-size: 11px; background: rgba(255,70,85,0.15); color: var(--accent); border: 1px solid rgba(255,70,85,0.3); padding: 3px 8px; border-radius: 20px; }

  .key-section { margin: 16px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .key-toggle { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; cursor: pointer; user-select: none; }
  .key-toggle-text { font-size: 13px; color: var(--muted); }
  .key-body { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); }
  .key-body.open { display: block; }
  .key-body label { display: block; font-size: 11px; color: var(--muted); margin: 12px 0 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .key-body input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); font-size: 13px; font-family: 'DM Sans', sans-serif; }
  .key-body input:focus { outline: 1px solid var(--accent); }
  .key-hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .key-hint a { color: var(--accent); }
  .save-btn { margin-top: 14px; width: 100%; padding: 10px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Syne', sans-serif; }

  .input-wrap { margin: 0 20px 12px; }
  .input-wrap textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; color: var(--text); font-size: 15px; font-family: 'DM Sans', sans-serif; resize: none; height: 70px; line-height: 1.5; }
  .input-wrap textarea:focus { outline: 1px solid var(--accent); }
  .input-wrap textarea::placeholder { color: var(--muted); }

  .run-all { margin: 0 20px 20px; display: block; width: calc(100% - 40px); padding: 14px; background: var(--accent); color: white; border: none; border-radius: 12px; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
  .run-all:disabled { opacity: 0.4; cursor: not-allowed; }

  .section-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; padding: 0 20px; margin-bottom: 10px; font-family: 'Syne', sans-serif; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 20px; }
  @media (min-width: 600px) { .grid { grid-template-columns: repeat(3, 1fr); } }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; display: flex; flex-direction: column; gap: 8px; transition: border-color 0.2s; }
  .card.running { border-color: var(--warn); }
  .card.done { border-color: var(--green); }
  .card.error { border-color: var(--accent); }

  .card-head { display: flex; align-items: center; gap: 8px; }
  .card-icon { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .card-name { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; }
  .card-model { font-size: 10px; color: var(--muted); }

  .card-status { font-size: 10px; min-height: 14px; }
  .card-status.running { color: var(--warn); }
  .card-status.done { color: var(--green); }
  .card-status.error { color: var(--accent); }

  .card-output { font-size: 12px; line-height: 1.6; color: #ccc; background: var(--surface2); border-radius: 8px; padding: 10px; display: none; max-height: 200px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; }
  .card-output.visible { display: block; }

  .card-img { border-radius: 8px; width: 100%; display: none; }
  .card-img.visible { display: block; }

  .card-foot { display: flex; gap: 6px; }
  .btn-run { flex: 1; padding: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .btn-run:hover { border-color: var(--accent); color: var(--accent); }
  .btn-run:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-copy { padding: 8px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-size: 12px; cursor: pointer; display: none; }
  .btn-copy.visible { display: block; }

  .style-tabs { display: flex; gap: 5px; flex-wrap: wrap; }
  .style-tab { font-size: 11px; padding: 4px 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); cursor: pointer; }
  .style-tab.active { border-color: var(--accent); color: var(--accent); }
  .img-nav { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
  .install-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 12px 20px; font-size: 12px; color: var(--muted); text-align: center; display: none; }
  .install-bar.show { display: block; }
</style>
</head>
<body>

<header>
  <div class="logo">Valo<span>Agence</span></div>
  <div class="badge">7 agents IA</div>
</header>

<div style="height:16px"></div>

<div class="key-section">
  <div class="key-toggle" onclick="toggleKey(this)">
    <span class="key-toggle-text">⚙ Clé API Groq</span>
    <span>▾</span>
  </div>
  <div class="key-body">
    <label>Clé Groq — une seule clé pour tous les agents</label>
    <input type="password" id="groq-key" placeholder="gsk_..." />
    <div class="key-hint">Gratuit sur <a href="https://console.groq.com" target="_blank">console.groq.com</a></div>
    <button class="save-btn" onclick="saveKey()">Enregistrer</button>
    <button class="save-btn" id="test-btn" onclick="testKey()" style="margin-top:6px;background:var(--surface2);border:1px solid var(--border);color:var(--text)">Tester la clé</button>
  </div>
</div>

<div class="input-wrap">
  <textarea id="sujet" placeholder="Sujet de ta vidéo (ex: les erreurs de visée en ranked)"></textarea>
</div>

<button class="run-all" id="run-all-btn" onclick="runAll()">⚡ Lancer tous les agents</button>

<div class="section-label">Agents</div>
<div class="grid" id="grid"></div>

<div class="install-bar" id="install-bar">
  📱 Safari → Partager → "Sur l'écran d'accueil" pour installer
</div>

<script>
const AGENTS = [
  {
    id: "recherche",
    name: "Chercheur",
    model: "Llama 3.3 · 70B",
    icon: "🔍", bg: "#1e3a5f",
    groq_model: "llama-3.3-70b-versatile",
    prompt: s => `Tu es un analyste data spécialisé croissance YouTube gaming francophone. Objectif : 100 000 vues par vidéo.

Sujet : "${s}" — série Valorant débutants ranked.

1. POTENTIEL VIRAL : pourquoi ce sujet peut exploser (search volume, frustration commune)
2. ANGLE DIFFÉRENCIANT : ce que les autres créateurs ratent sur ce sujet
3. TOP 5 ERREURS DÉBUTANTS : les plus universelles et frustrantes, avec données concrètes
4. HOOK PSYCHOLOGIQUE : quelle émotion exploiter (honte, espoir, curiosité, colère) pour maximiser le CTR
5. MOTS-CLÉS : termes les plus recherchés par les débutants sur ce sujet

Sois direct, concret, orienté performance. En français.`
  },
  {
    id: "script",
    name: "Scénariste",
    model: "Llama 3.3 · 70B",
    icon: "📝", bg: "#1a3d2e",
    groq_model: "llama-3.3-70b-versatile",
    prompt: s => `Tu es un scénariste YouTube expert en rétention et viralité gaming francophone. Objectif : 100 000 vues minimum.

Sujet : "${s}" — série Valorant débutants ranked.

Propose 3 AXES NARRATIFS pour ce sujet :

AXE 1 — "L erreur que TOUT LE MONDE fait"
- Accroche (0-15s) + structure + twist + CTA + potentiel rétention estimé

AXE 2 — "La transformation before/after"
- Accroche (0-15s) + structure + twist + CTA + potentiel rétention estimé

AXE 3 — "L angle contre-intuitif"
- Accroche (0-15s) + structure + twist + CTA + potentiel rétention estimé

Pour chaque axe : durée idéale et pourquoi ca peut exploser. En français.`
  },
  {
    id: "seo",
    name: "Titre & SEO",
    model: "Llama 3.1 · 8B",
    icon: "📈", bg: "#3d2a0a",
    groq_model: "llama-3.1-8b-instant",
    prompt: s => `Tu es expert SEO YouTube gaming francophone. Objectif : maximiser CTR et atteindre 100 000 vues.

Sujet : "${s}" — série Valorant débutants ranked.

TITRES (3 options classées par potentiel CTR)
- Titre A [Émotion] : max 60 chars + score CTR estimé /10
- Titre B [Curiosité] : max 60 chars + score CTR estimé /10
- Titre C [Transformation] : max 60 chars + score CTR estimé /10

DESCRIPTION (150 mots)
- Première ligne ultra-accrocheuse (visible avant voir plus)
- Corps avec mots-clés naturels + CTA

TAGS (15 tags du plus au moins compétitif)

STRATÉGIE BOOST
- Meilleur moment de publication + communautés où partager + idée de Short

En français.`
  },
  {
    id: "miniature",
    name: "Miniature",
    model: "Pollinations.ai",
    icon: "🎨", bg: "#3d1a2e",
    groq_model: null,
    styleIdx: 0,
    styles: [
      { label: "🔥 Choc",  prompt: s => `YouTube high CTR thumbnail Valorant beginner "${s}", extreme shocked face close-up, giant red X warning, neon red black dramatic lighting, bold white impact font, viral style` },
      { label: "💡 Tuto",  prompt: s => `YouTube tutorial high CTR thumbnail Valorant "${s}", clean split before after comparison, blue orange contrast, upward arrow, progress chart, bright modern flat design, bold sans-serif` },
      { label: "😤 Rage",  prompt: s => `YouTube viral thumbnail Valorant rank fail "${s}", exaggerated rage face gamer meme, fire explosion background, broken keyboard, comic style, orange red yellow contrast, bold fat text` },
      { label: "🎯 Pro",   prompt: s => `YouTube premium thumbnail Valorant pro "${s}", cinematic dark scene, agent silhouette glowing crosshair, gold rank emblem, sleek minimal typography, dramatic spotlight, 4K esports` },
    ]
  },
  {
    id: "coaching",
    name: "Coach Valo",
    model: "Llama 3.3 · 70B",
    icon: "🧠", bg: "#2a1a1a",
    groq_model: "llama-3.3-70b-versatile",
    prompt: s => `Tu es un coach Valorant professionnel et psychologue du sport spécialisé esport. Tu as coaché des joueurs de Bronze à Diamond. Tu comprends autant le jeu que le mental des joueurs.

Sujet de la vidéo : "${s}" — série pour débutants en ranked.

Livre un coaching complet en deux volets :

VOLET 1 — CORRECTION TECHNIQUE (in-game)
Pour chaque erreur liée au sujet :
— L'erreur exacte et pourquoi elle se produit neurologiquement (habitude, automatisme)
— Exercice concret pour la corriger (avec durée et fréquence recommandées)
— Comment mesurer sa progression sur cet aspect

VOLET 2 — DÉVELOPPEMENT MENTAL
— Le pattern mental toxique lié à ce sujet (ex: tilt, ego, impatience)
— Technique de reset mental immédiat (utilisable en partie)
— Routine mentale pré-game pour aborder ce sujet avec le bon état d'esprit
— Citation ou mindset de pro à adopter sur ce point

BONUS — CONSEIL POUR LE CRÉATEUR
— Comment présenter ce coaching dans ta vidéo pour que les spectateurs ressentent une vraie transformation
— Formule d'accroche émotionnelle liée à ce sujet

En français, concret, bienveillant mais exigeant.`
  },
  {
    id: "planning",
    name: "Planning",
    model: "Llama 3.1 · 8B",
    icon: "📅", bg: "#1a3320",
    groq_model: "llama-3.1-8b-instant",
    prompt: s => `Tu es un stratège de contenu YouTube spécialisé en croissance de chaînes gaming francophones. Objectif : construire un calendrier éditorial qui crée une dynamique d'audience vers 100 000 vues par vidéo.

Vidéo actuelle : "${s}" — série Valorant débutants ranked.

Livre une stratégie éditoriale complète :

CALENDRIER 6 SEMAINES (après cette vidéo)
Pour chaque semaine :
— Sujet de vidéo + titre accrocheur
— Angle narratif (quel axe exploiter)
— Lien avec la vidéo précédente (pour pousser la rétention d'audience)
— Format recommandé (tuto, analyse, challenge, vlog gameplay)

STRATÉGIE DE SÉRIE
— Comment créer une dépendance narrative entre les vidéos
— Quel sujet garder en teaser pour la semaine suivante
— Idées de Shorts à publier entre les vidéos longues

OBJECTIFS DE PROGRESSION
— Vues attendues par vidéo si la stratégie est bien exécutée
— Indicateurs à surveiller (CTR, rétention moyenne, abonnés/vidéo)

En français, concret et actionnable.`
  },
  {
    id: "partenariat",
    name: "Partenariat",
    model: "Llama 3.1 · 8B",
    icon: "🤝", bg: "#2a1a3d",
    groq_model: "llama-3.1-8b-instant",
    prompt: s => `Tu es un manager d'influenceurs gaming expert en négociation de partenariats pour créateurs YouTube. Tu connais exactement ce que les marques veulent entendre.

Contexte : chaîne YouTube Valorant débutants ranked, vidéo en cours sur "${s}", objectif 100 000 vues/vidéo.

Livre un kit de prospection complet :

EMAIL DE PROSPECTION (200 mots max)
— Objet d'email irrésistible
— Corps du mail : accroche personnalisée, pitch chiffré, proposition de valeur, CTA clair

MARQUES À CIBLER EN PRIORITÉ
— 5 marques gaming pertinentes avec pourquoi elles matchent cette audience
— Pour chaque marque : type de deal à proposer (code promo, placement, unboxing)

ARGUMENTAIRE DE VENTE
— Ce que cette audience apporte à une marque (profil, âge, intention d'achat)
— Comment présenter ses stats même avec peu d'abonnés (taux d'engagement, niche, potentiel)

TARIFICATION INDICATIVE
— Grille de prix selon le nombre de vues par vidéo
— Ce qu'il ne faut jamais accepter en dessous

En français, direct et professionnel.`
  }
];

function toggleKey(el) {
  const body = el.nextElementSibling;
  body.classList.toggle("open");
}

function saveKey() {
  const val = document.getElementById("groq-key").value.replace(/\s+/g, "").trim();
  if (!val) return;
  localStorage.setItem("groq_key", val);
  const btn = document.querySelector(".save-btn");
  btn.textContent = "✓ Enregistré (" + val.length + " chars)";
  setTimeout(() => btn.textContent = "Enregistrer", 3000);
}

async function testKey() {
  const key = localStorage.getItem("groq_key");
  const btn = document.getElementById("test-btn");
  if (!key) { btn.textContent = "❌ Aucune clé enregistrée"; return; }
  btn.textContent = "Test en cours...";
  try {
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + key.replace(/\s+/g, "").trim()
      },
      body: JSON.stringify({
        model: "llama-3.1-8b-instant",
        messages: [{ role: "user", content: "Dis juste OK" }],
        max_tokens: 5
      })
    });
    const d = await res.json();
    if (res.ok) {
      btn.textContent = "✅ Clé valide !";
    } else {
      btn.textContent = "❌ " + (d.error?.message || "Clé invalide");
    }
  } catch(e) {
    btn.textContent = "❌ " + e.message;
  }
  setTimeout(() => btn.textContent = "Tester la clé", 4000);
}
